<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Regras - Cidade</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 2px solid #1e293b;
}

.container {
    display: flex;
}

.sidebar {
    width: 250px;
    background: #020617;
    padding: 15px;
    border-right: 2px solid #1e293b;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: #1e293b;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar button:disabled {
    background: #334155;
    cursor: not-allowed;
}

.content {
    flex: 1;
    padding: 30px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #1e293b;
}

button.confirm {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    background: green;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
}

.final {
    text-align: center;
    font-size: 22px;
    color: #22c55e;
}
</style>
</head>

<body>

<header>📜 Painel de Regras - Cidade</header>

<div class="container">

<div class="sidebar">
    <button id="btn0">Boas-vindas</button>
    <button id="btn1" disabled>Discord</button>
    <button id="btn2" disabled>Loja</button>
    <button id="btn3" disabled>Regras Gerais</button>
    <button id="btn4" disabled>Roleplay</button>
    <button id="btn5" disabled>Torcidas</button>
    <button id="btn6" disabled>Denúncias</button>
    <button id="btn7" disabled>Punições</button>
</div>

<div class="content">
    <div class="card" id="content"></div>
</div>

</div>

<script>

let etapa = localStorage.getItem("etapa") || 0;
etapa = parseInt(etapa);

const conteudos = [

`<h2>Bem-vindo</h2>
<p>Seja bem-vindo à cidade.</p>
<p>Leia todas as regras antes de jogar.</p>`,

`<h2>Regras Discord</h2>
<p>Proibido racismo, ofensas, divulgação e conteúdo impróprio.</p>`,

`<h2>Regras Loja</h2>
<p>Sem reembolso. VIP não pode ser vendido.</p>`,

`<h2>Regras Gerais</h2>
<p>Proibido discriminação, hacks, bugs e vantagens ilegais.</p>`,

`<h2>Regras Roleplay</h2>
<p>Proibido RDM, VDM, MetaGaming, Combat Logging e Anti RP.</p>`,

`<h2>Regras Torcidas</h2>
<p>Sem invasão, alianças ilegais ou ações fora das regras.</p>`,

`<h2>Denúncias</h2>
<p>Obrigatório vídeo, ID e até 24h.</p>`,

`<h2>Punições</h2>
<p>Advertências, prisão e banimentos conforme regras.</p>
<div class="final">
✔ Você concluiu todas as regras!<br><br>
Clique abaixo para confirmar
</div>
<button class="confirm" onclick="finalizar()">ACEITO TODAS AS REGRAS</button>`
];

function atualizarMenu() {
    for (let i = 0; i <= etapa; i++) {
        document.getElementById("btn"+i).disabled = false;
    }
}

function carregar(index) {
    if(index > etapa) return;
    document.getElementById("content").innerHTML = conteudos[index];
}

function concluir() {
    if (etapa < conteudos.length - 1) {
        etapa++;
        localStorage.setItem("etapa", etapa);
        atualizarMenu();
        carregar(etapa);
    }
}

function finalizar() {
    alert("Você aceitou todas as regras!");
    localStorage.setItem("finalizado", true);
}

document.querySelectorAll(".sidebar button").forEach((btn, i) => {
    btn.onclick = () => carregar(i);
});

document.getElementById("content").onclick = function(e){
    if(e.target.classList.contains("confirm") === false){
        concluir();
    }
}

atualizarMenu();
carregar(etapa);

</script>

</body>
</html>
