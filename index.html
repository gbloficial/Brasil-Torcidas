<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Regras - Cidade</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    border-bottom: 2px solid #1e293b;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 260px;
    background: #020617;
    padding: 15px;
    border-right: 2px solid #1e293b;
    overflow-y: auto;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: #1e293b;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
}

.sidebar button:hover {
    background: #334155;
}

.sidebar button:disabled {
    background: #0f172a;
    color: #555;
    cursor: not-allowed;
}

.content {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.card {
    background: #020617;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #1e293b;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.actions {
    margin-top: 20px;
}

.actions label {
    display: block;
    margin-bottom: 10px;
    cursor: pointer;
}

button.confirm {
    margin-top: 15px;
    padding: 14px;
    width: 100%;
    background: #22c55e;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
}

button.deny {
    margin-top: 10px;
    padding: 14px;
    width: 100%;
    background: #ef4444;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
}

.discord-btn {
    background: #5865F2;
    margin-top: 10px;
}

</style>
</head>

<body>

<header>🏙️ Painel de Regras - SUA CIDADE</header>

<div class="container">

<div class="sidebar">
    <button id="btn0">Boas-vindas</button>
    <button id="btn1" disabled>Discord</button>
    <button id="btn2" disabled>Loja</button>
    <button id="btn3" disabled>Regras Gerais</button>
    <button id="btn4" disabled>Roleplay</button>
    <button id="btn5" disabled>Torcidas</button>
    <button id="btn6" disabled>Denúncias</button>
    <button id="btn7" disabled>Punições</button>
</div>

<div class="content">
    <div class="card" id="content"></div>
</div>

</div>

<script>

let etapa = localStorage.getItem("etapa") || 0;
etapa = parseInt(etapa);

function template(titulo, texto) {
    return `
    <h2>${titulo}</h2>
    <div>${texto}</div>

    <div class="actions">
        <label><input type="radio" name="resp"> Concordo com as regras</label>
        <label><input type="radio" name="resp"> Não concordo</label>

        <button class="confirm" onclick="confirmar()">Confirmar</button>
        <button class="deny" onclick="recusar()">Não concordo</button>
    </div>
    `;
}

const conteudos = [

template("Bem-vindo", `
<p>Seja bem-vindo à cidade.</p>
<p>Leia TODAS as regras para continuar.</p>
<button class="confirm discord-btn" onclick="window.open('https://discord.gg/Y2xPKu6TJY')">
Entrar no Discord
</button>
`),

template("Discord", `
<p>Proibido racismo, ofensas, divulgação e conteúdo impróprio.</p>
`),

template("Loja", `
<p>Sem reembolso. VIP não pode ser vendido.</p>
`),

template("Regras Gerais", `
<p>Proibido hacks, bugs, discriminação e vantagens ilegais.</p>
`),

template("Roleplay", `
<p>Proibido RDM, VDM, MetaGaming, Combat Logging e Anti RP.</p>
`),

template("Torcidas", `
<p>Sem invasões ilegais, alianças proibidas ou abuso.</p>
`),

template("Denúncias", `
<p>Obrigatório vídeo + ID + até 24h.</p>
`),

`
<h2>Punições</h2>
<p>Advertências, prisões e banimentos.</p>

<button class="confirm" onclick="finalizar()">ACEITO TODAS AS REGRAS</button>
`
];

function atualizarMenu() {
    for (let i = 0; i <= etapa; i++) {
        document.getElementById("btn"+i).disabled = false;
    }
}

function carregar(index) {
    if(index > etapa) return;
    document.getElementById("content").innerHTML = conteudos[index];
}

function confirmar() {
    const radios = document.querySelectorAll('input[name="resp"]');
    if (!radios[0].checked && !radios[1].checked) {
        alert("Escolha uma opção!");
        return;
    }

    if (radios[1].checked) {
        recusar();
        return;
    }

    if (etapa < conteudos.length - 1) {
        etapa++;
        localStorage.setItem("etapa", etapa);
        atualizarMenu();
        carregar(etapa);
    }
}

function recusar() {
    alert("Você não pode entrar na cidade sem aceitar as regras.");
    localStorage.clear();
    location.reload();
}

function finalizar() {
    alert("Regras aceitas com sucesso!");
    localStorage.setItem("finalizado", true);
}

document.querySelectorAll(".sidebar button").forEach((btn, i) => {
    btn.onclick = () => carregar(i);
});

atualizarMenu();
carregar(etapa);

</script>

</body>
</html>
